<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MOONGLOW | Premium Store</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="glow-bg"></div>

    <nav class="navbar">
        <div class="container nav-flex">
            <div class="logo">
                <i class="fa-solid fa-moon-stars" style="color: #a855f7; font-size: 1.8rem;"></i>
                <span class="brand-name">MOONGLOW</span>
            </div>
            <div class="premium-tag"><i class="fa-solid fa-crown"></i> Official</div>
        </div>
    </nav>

    <header class="hero">
        <div class="container">
            <h1 class="hero-title">Premium Digital <span class="accent">Assets</span></h1>
            <p class="hero-subtitle">Fast Delivery • 100% Secure • Trusted</p>
        </div>
    </header>

    <div class="container">
        <div id="dynamicCats" class="cat-container"></div>
    </div>

    <main class="container">
        <div id="productList" class="product-grid">
            <div class="loading-state">
                <div class="spinner"></div>
                <p>Connecting to Cloud...</p>
            </div>
        </div>
    </main>

    <footer class="footer">
        <p>&copy; 2026 MOONGLOW Store</p>
        <p class="dev">Developed by <a href="https://facebook.com/yourprofile" target="_blank">HRIDOY HASAN</a></p>
    </footer>

    <div id="orderModal" class="modal">
        <div class="modal-content glass">
            <h3><i class="fa-solid fa-cart-shopping"></i> Complete Order</h3>
            <div id="mInfo" class="order-info"></div>
            <form id="orderForm">
                <div class="input-box"><i class="fa-solid fa-user"></i><input type="text" id="uName" placeholder="Full Name" required></div>
                <div class="input-box"><i class="fa-brands fa-whatsapp"></i><input type="text" id="uPhone" placeholder="WhatsApp Number" required></div>
                <button type="submit" class="submit-btn">Purchase Now</button>
                <button type="button" class="cancel-btn" onclick="closeModal()">Cancel</button>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
</body>
                    </html>
