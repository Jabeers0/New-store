<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MOONGLOW | Premium Store</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="bg-blur"></div>

    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">
                <img src="logo.png" alt="MOONGLOW" class="nav-logo">
                <span class="logo-name">MOONGLOW</span>
            </div>
            <div class="nav-right">
                <div class="search-bar">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    <input type="text" id="searchBar" placeholder="Search..." onkeyup="filterProducts()">
                </div>
                <button class="theme-btn"><i class="fa-solid fa-moon"></i></button>
            </div>
        </div>
    </nav>

    <header class="hero-section">
        <div class="status-badge"><i class="fa-solid fa-circle-check"></i> Trusted & Secure</div>
        <h1 class="main-title">Premium Digital Goods</h1>
        <p class="sub-text">Managed by <b>HRIDOY HASAN</b></p>
        <div class="hero-btns">
            <a href="#productList" class="shop-btn">View All Items <i class="fa-solid fa-arrow-down"></i></a>
        </div>
    </header>

    <div class="filters">
        <div id="dynamicCats" class="cat-list">
            <button class="cat-item active" onclick="filterByCategory('All', this)"><i class="fa-solid fa-layer-group"></i> All Items</button>
        </div>
    </div>

    <main class="content">
        <div id="productList" class="grid-layout">
            <p class="loading">Fetching data...</p>
        </div>
    </main>

    <div class="support-area">
        <div id="supportMenu" class="support-box">
            <a href="https://wa.me/8801XXXXXXXXX" class="s-link"><i class="fa-brands fa-whatsapp"></i> WhatsApp Chat</a>
            <a href="#" class="s-link"><i class="fa-brands fa-discord"></i> Discord Server</a>
        </div>
        <button class="fab-btn" onclick="toggleSupport()"><i class="fa-solid fa-headset"></i></button>
    </div>

    <div class="modal" id="orderModal">
        <div class="modal-content">
            <div class="modal-head">
                <h3><i class="fa-solid fa-cart-flatbed-suitcase"></i> Confirm Purchase</h3>
                <span class="close" onclick="closeModal()"><i class="fa-solid fa-xmark"></i></span>
            </div>
            <p id="itemDetails" class="item-info"></p>
            <form id="orderForm">
                <div class="input-field">
                    <i class="fa-solid fa-user"></i>
                    <input type="text" id="uName" placeholder="Enter Your Name" required>
                </div>
                <div class="input-field">
                    <i class="fa-brands fa-whatsapp"></i>
                    <input type="text" id="uPhone" placeholder="WhatsApp Number" required>
                </div>
                <div class="input-field">
                    <i class="fa-brands fa-discord"></i>
                    <input type="text" id="uDiscord" placeholder="Discord User ID">
                </div>
                <input type="hidden" id="hName">
                <input type="hidden" id="hPrice">
                <button type="submit" class="order-submit">Confirm via WhatsApp <i class="fa-solid fa-paper-plane"></i></button>
            </form>
        </div>
    </div>

    <footer class="footer">
        <p>&copy; 2026 MOONGLOW Store | Reliable Platform</p>
        <p class="credit">Developed by <span>HRIDOY HASAN</span></p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
