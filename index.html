<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MOONGLOW | Premium Store</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="glow-bg"></div>

    <div class="floating-support">
        <a href="https://wa.me/8801XXXXXXXXX" class="sup-btn wa" target="_blank"><i class="fa-brands fa-whatsapp"></i></a>
        <a href="https://discord.gg/yourlink" class="sup-btn dc" target="_blank"><i class="fa-brands fa-discord"></i></a>
    </div>

    <nav class="navbar">
        <div class="container nav-flex">
            <div class="logo">
                <div class="logo-box">M</div>
                <span class="brand-name">MOONGLOW</span>
            </div>
            <div class="premium-tag">PREMIUM SOLUTIONS</div>
        </div>
    </nav>

    <header class="hero">
        <div class="container">
            <h1 class="hero-title">Exclusive <span class="accent">Digital Assets</span></h1>
            <p class="hero-sub">Fast • Secure • Reliable</p>
        </div>
    </header>

    <div class="container">
        <div id="dynamicCats" class="cat-wrapper"></div>

        <div id="productList" class="product-grid">
            <div class="loader">
                <div class="spinner"></div>
                <p>Syncing with Cloud...</p>
            </div>
        </div>
    </div>

    <div id="orderModal" class="modal">
        <div class="modal-content glass">
            <h3>Confirm Your Order</h3>
            <div id="mInfo" class="order-summary"></div>
            
            <form id="orderForm">
                <div class="qty-control">
                    <label>Select Quantity:</label>
                    <input type="number" id="uQty" value="1" min="1" max="10" required class="form-input">
                </div>
                <input type="text" id="uName" placeholder="Full Name" required class="form-input">
                <input type="text" id="uPhone" placeholder="WhatsApp Number" required class="form-input">
                <button type="submit" class="submit-btn">Proceed to WhatsApp</button>
                <button type="button" class="close-link" onclick="closeModal()">Cancel</button>
            </form>
        </div>
    </div>

    <footer class="footer">
        <p>&copy; 2026 MOONGLOW | Developed by <a href="https://facebook.com/yourprofile" target="_blank">HRIDOY HASAN</a></p>
    </footer>

    <script src="script.js"></script>
</body>
    </html>
